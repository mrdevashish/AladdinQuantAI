name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            python3-pip \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            build-essential \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake

      - name: Install python-for-android
        run: |
          pip install python-for-android

      - name: Build APK
        run: |
          p4a apk \
            --private . \
            --package org.aladdin.quant \
            --name AladdinQuantAI \
            --version 0.1 \
            --bootstrap=sdl2 \
            --requirements=python3 \
            --arch=arm64-v8a \
            --sdk-dir=$HOME/android-sdk \
            --ndk-api=21

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AladdinQuantAI-APK
          path: dist/*.apk
