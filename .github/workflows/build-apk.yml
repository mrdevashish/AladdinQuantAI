name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            python3-pip \
            git \
            zip \
            unzip \
            wget \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            build-essential \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake


      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython


      - name: Configure Android environment
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV


      - name: Build APK
        run: |
          buildozer -v android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython


      - name: Install Android SDK
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk

          # ensure buildozer directories exist
          mkdir -p $HOME/.buildozer/android/platform
          mkdir -p $ANDROID_HOME
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/tools/bin

          cd $HOME

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip -q commandlinetools-linux-11076708_latest.zip

          mv cmdline-tools $ANDROID_HOME/cmdline-tools/latest

          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH


      - name: Install Android build tools
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses

          sdkmanager "platform-tools"
          sdkmanager "platforms;android-31"
          sdkmanager "build-tools;31.0.0"


      - name: Configure Android environment
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV

          echo "$HOME/.buildozer/android/platform/android-sdk/platform-tools" >> $GITHUB_PATH


      - name: Build APK
        run: |
          buildozer -v android debug log_level=2


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
