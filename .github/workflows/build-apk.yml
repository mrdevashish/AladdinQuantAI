name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            python3-pip \
            git \
            zip \
            unzip \
            wget \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            build-essential \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            cmake


      - name: Install Python tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython


      - name: Build APK
        run: |
          buildozer -v android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
